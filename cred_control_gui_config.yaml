gui:
  window_title: "C-RED ONE Control"
  window_geometry: [100, 100, 1200, 800]
  top_splitter_sizes: [350, 850]
  main_splitter_sizes: [650, 150]

cam:
  edt_dir: "/opt/EDTpdv"
  tmp_frame_path: "/usr/local/aodev/CRED-One/Data/tmp/CRED_frame.raw"
  # Ring-buffer count for `take -N <n>`. 200 matches cred_test_prelim.py
  # AND CREDOne_Disp.py's live display (the known-working reference),
  # both hardcoded to 200 unconditionally -- so this is NOT confirmed to
  # be mode-dependent. Left configurable in case testing proves otherwise.
  take_nbuffers: 200
  # Path used by the "Re-init Frame Grabber" button, matching the
  # `initcam` command from the pyCRED README's camera startup steps.
  cred_cfg_path: "~/../../usr/local/aodev/CRED-One/cred_default.cfg"
  # Seconds to wait after any set fps/gain/mode/ndr/rawimages call (or a
  # frame grabber re-init) before allowing a capture. Confirmed necessary
  # on hardware -- captures fail with a pdv_multibuf ring-buffer error if
  # attempted too soon after a settings change. 70s matches the more
  # conservative wait in cred_test_prelim.py's dark_bursts(); tune down
  # if testing shows a shorter wait is sufficient.
  settle_seconds: 70

fps:
  range: [1, 3500]
  default: 3500

gain:
  range: [0, 1000]
  default: 1

ndr:
  range: [1, 200]
  default: 1

burst:
  nframes_default: 50

live_view:
  interval_ms: 500

logging:
  max_lines: 300
  font_size: 8

styling:
  use_keck_theme: true
  font_size: 9
